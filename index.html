<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <link
      href="https://fonts.googleapis.com/css?family=Figtree:300,regular,500,600,700,800,900,300italic,italic,500italic,600italic,700italic,800italic,900italic"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <!-- Card Container -->
      <section class="card-container">
        <!-- Thumbnail Container -->
        <section class="thumbnail">
          <img
            src="/02-blog-preview-card-main/assets/images/illustration-article.svg"
            alt=""
          />
        </section>
        <div class="card-content">
          <!-- Tag Container -->
          <section class="tag">
            <p>Learning</p>
          </section>
          <section class="date-tag">
            <p>Published 21 Dec 2023</p>
          </section>
          <section class="card-title">
            <h2>HTML & CSS foundations</h2>
          </section>
          <section class="card-desc">
            <p>
              These languages are the backbone of every website, defining
              structure, content, and presentation.
            </p>
          </section>
        </div>
        <!-- User Container -->
        <div class="card-user">
          <section class="card-profile">
            <img
              src="/02-blog-preview-card-main/assets/images/image-avatar.webp"
              alt="User Profile"
            />
          </section>
          <section class="card-username">
            <p>Greg Hooper</p>
          </section>
        </div>
      </section>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by ❤️<a href="#">Elvis</a>.
    </footer>
  </body>
</html>
